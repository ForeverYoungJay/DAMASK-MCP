name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests

      - name: Inspect FastMCP server
        run: python -c "import asyncio; from server import mcp; tools = asyncio.run(mcp.list_tools()); assert len(tools) == 69, len(tools); print(f'{mcp.name}: {len(tools)} tools')"
