[mcp_servers.damask]
command = "conda"
args = [
  "run",
  "--no-capture-output",
  "-n",
  "damaskcp",
  "python",
  "-m",
  "damask_mcp.mcp_servers.damask_server"
]
cwd = "/ABSOLUTE/PATH/TO/DAMASK-MCP"
startup_timeout_sec = 30
tool_timeout_sec = 3600

[mcp_servers.damask.env]
PYTHONPATH = "/ABSOLUTE/PATH/TO/DAMASK-MCP/src"
